<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">➕ Agregar Nuevo Libro</h2>

      <div class="card shadow">
        <div class="card-body">
          
          <!-- Nombre del libro -->
          <input 
            class="form-control mb-3" 
            type="text" 
            [(ngModel)]="nombre" 
            placeholder="Nombre del libro"
          />

          <!-- Autor -->
          <input 
            class="form-control mb-3" 
            type="text" 
            [(ngModel)]="autor" 
            placeholder="Autor del libro"
          />

          <!-- Género -->
          <select class="form-select mb-3" [(ngModel)]="genero">
            <option value="">Selecciona un género</option>
            @for (gen of generosDisponibles; track $index) {
              <option [value]="gen">{{ gen }}</option>
            }
          </select>

          <!-- Botones -->
          <button class="btn btn-success mb-3 w-100" (click)="agregarLibro()">
            ✅ Agregar Libro
          </button>
          
          <button class="btn btn-secondary w-100" (click)="limpiarFormulario()">
            🔄 Limpiar
          </button>

        </div>
      </div>
    </div>
  </div>
</div>
