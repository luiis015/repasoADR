<div class="container mt-5">
  <h2 class="mb-4">📖 Catálogo de Libros</h2>

  <!-- Filtro por género -->
  <div class="row mb-4">
    <div class="col-md-4">
      <label for="filtroGenero" class="form-label">Filtrar por género:</label>
      <select
        id="filtroGenero"
        class="form-select"
        [(ngModel)]="generoSeleccionado"
        (change)="filtrar()"
      >
        <option value="Todos">Todos</option>
        @for (genero of generosDisponibles; track $index) {
          <option [value]="genero">{{ genero }}</option>
        }
      </select>
    </div>
  </div>

  <!-- Tarjetas de libros -->
  <div class="row">
    @if (librosFiltrados.length > 0) {
      @for (libro of librosFiltrados; track libro.id) {
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">📚 {{ libro.nombre }}</h5>
              <p class="card-text">
                <strong>Autor:</strong> {{ libro.autor }}
              </p>
              <p class="card-text">
                <span class="badge bg-primary">{{ libro.genero }}</span>
              </p>
            </div>
          </div>
        </div>
      }
    } @else {
      <div class="col-12">
        <div class="alert alert-warning" role="alert">
          ⚠️ No se encontraron libros en este género.
        </div>
      </div>
    }
  </div>
</div>
